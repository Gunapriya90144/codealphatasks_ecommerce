<input id="name" placeholder="Name"><br><br>

<input id="image" placeholder="Image URL"><br><br>
<input id="desc" placeholder="Description"><br><br>

</div>

<script>

let cart=[];

/* LOAD PRODUCTS */

async function loadProducts(){

const res=await fetch("/products");

const data=await res.json();

display(data);

}

function display(data){

const container=document.getElementById("products");

container.innerHTML="";

data.forEach(p=>{

container.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button onclick="addToCart('${p.name}',${p.price})">Add To Cart</button>

</div>

`;

});

}

/* SEARCH */

async function search(){

const q=document.getElementById("searchText").value;

const res=await fetch("/search?q="+q);

const data=await res.json();

display(data);

}

/* CART */

function addToCart(name,price){

cart.push({name,price});

alert("Added to cart");

}

function toggleCart(){

document.getElementById("cart").classList.toggle("hidden");

loadCart();

}

function loadCart(){

let div=document.getElementById("cartItems");

div.innerHTML="";

let total=0;

cart.forEach((item,i)=>{

total+=item.price;

div.innerHTML+=`

<p>${item.name} - ₹${item.price}</p>

`;

});

document.getElementById("total").innerText="Total ₹"+total;

}

async function checkout(){

let total=0;

cart.forEach(i=>total+=i.price);

await fetch("/order",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({items:cart,total})

});

alert("Order placed");

cart=[];

toggleCart();

}

/* ADMIN LOGIN */

async function login(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

const res=await fetch("/admin-login",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({email,password})

});

const data=await res.json();

if(data.success){

alert("Admin Login Success");

document.getElementById("adminPanel").classList.remove("hidden");

}else{

alert("Wrong login");

}

}

/* ADD PRODUCT */

async function addProduct(){

const name=document.getElementById("name").value;

const price=document.getElementById("price").value;

const image=document.getElementById("image").value;

const description=document.getElementById("desc").value;

await fetch("/add-product",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({name,price,image,description})

});

alert("Product Added");

loadProducts();

}

loadProducts();

</script>

</body>
